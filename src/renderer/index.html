<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tridoku</title>
  </head>
  <body>
    <div id="app">
      <canvas id="board" width="640" height="560" aria-label="Tridoku grid: first nine primes 2–23"></canvas>
      <aside id="hud" aria-live="polite">
        <button type="button" id="newgame">New Game</button>
        <button type="button" id="resolve">Auto Resolve</button>
        <div class="stat">
          <span class="label">Conflicts</span>
          <span id="conflicts">0</span>
        </div>
        <p id="status" class="status"></p>
        <p class="help">
        Primes - 2, 3, 5, 7, 11, 13, 17, 19, 23
        </p>
        <p class="help">
          Arrows: move. Backspace: clear ·
        </p>
      </aside>
    </div>
    <script type="module" src="./src/renderer.ts"></script>
  </body>
</html>
